name: Tests

# Unit + end-to-end test gates for SwingVantage. Complements growth-ci.yml
# (type-check/lint/build/growth-audit), security-audit.yml and codeql.yml —
# none of which previously ran Jest or Playwright. This workflow closes that
# gap so a broken unit test or core user journey is caught before it ships.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Unit tests (Jest) — 1300+ tests across the lib/ engines.
  # ─────────────────────────────────────────────
  unit:
    name: Unit tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Jest
        run: npm run test

  # ─────────────────────────────────────────────
  # E2E journeys (Playwright). Playwright is intentionally NOT a committed
  # dependency (keeps the default install lean), so this job installs the
  # runner on the fly — leaving package.json / package-lock.json untouched.
  # ─────────────────────────────────────────────
  e2e:
    name: E2E journeys (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund
      - name: Add Playwright test runner + axe (not saved to package.json)
        run: npm install --no-save @playwright/test@^1.60.0 @axe-core/playwright
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run E2E journeys (builds + starts the app on :3100)
        run: npm run test:e2e
        working-directory: apps/web
        env:
          CI: 'true'
      - name: Upload Playwright traces (on failure)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-traces
          path: apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7
