name: Growth CI

# Quality + growth gates for SwingVantage. Complements codeql.yml and
# security-audit.yml (which handle security scanning).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Allow manual re-runs (e.g. to re-validate a PR head when the pull_request
  # event didn't re-trigger), mirroring the Tests workflow.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Type-check, lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Bundle budget — fail if a route's first-load JS exceeds its limit
        run: npm run check:bundle

  growth-audit:
    name: Placeholder, SEO, content, link & sitemap checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run growth audit
        run: npm run audit:growth

  dependency-audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit (critical only, non-blocking)
        run: npm run security:deps || true
