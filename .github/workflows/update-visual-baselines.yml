name: Update Visual Baselines

# Maintenance workflow (manual only). Regenerates the Playwright visual-regression
# baselines for e2e/visual on the CI platform (ubuntu / chromium-linux) so they
# match what the "E2E journeys (Playwright)" gate actually compares against, then
# uploads them as an artifact to download + commit. Run after an intentional UI
# change.
#
# By default it does NOT push (artifact only). Set the `commit_to_branch` input to
# true to also commit the regenerated baselines back to the triggering branch — use
# this when the artifact can't be downloaded locally (e.g. restricted egress).

on:
  workflow_dispatch:
    inputs:
      commit_to_branch:
        description: 'Also commit the regenerated baselines back to the triggering branch'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    name: Generate visual baselines (chromium-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund
      - name: Add Playwright test runner + axe (not saved to package.json)
        run: npm install --no-save @playwright/test@^1.60.0 @axe-core/playwright
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Regenerate visual baselines (builds + starts the app on :3100)
        run: npx playwright test e2e/visual --update-snapshots
        working-directory: apps/web
        env:
          CI: 'true'
      - name: Upload regenerated baselines
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: visual-baselines
          path: apps/web/e2e/visual/**/*-snapshots/**
          if-no-files-found: error
          retention-days: 3
      - name: Commit regenerated baselines to the triggering branch
        if: ${{ inputs.commit_to_branch && !cancelled() }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- apps/web/e2e/visual
          if git diff --cached --quiet; then
            echo 'No baseline changes to commit.'
            exit 0
          fi
          git commit -m 'test(visual): regenerate Playwright baselines on CI (chromium-linux)

          Co-Authored-By: Claude <noreply@anthropic.com>'
          git push origin "HEAD:${{ github.ref_name }}"
